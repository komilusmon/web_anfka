<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-7357410271113724">
    <title>ANFKA Academy - Kabinet</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
        .progress-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        .course-progress-card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
        .global-chat {
            background: white;
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: 1.5rem;
            max-height: 400px;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .chat-message {
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            background: var(--light-bg);
        }
        .chat-message .username {
            font-weight: bold;
            color: var(--primary-color);
        }
        .chat-input-group {
            display: flex;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">🎓 ANFKA Academy</a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">Asosiy</a></li>
            <li><a href="courses.html" class="nav-link">Kurslar</a></li>
            <li><a href="contact.html" class="nav-link">Aloqa</a></li>
            <li><a href="#" class="nav-link" id="logout-btn">Chiqish</a></li>
        </ul>
    </nav>

    <div class="container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <h1 id="user-greeting">👋 Xush kelibsiz!</h1>
            <p id="user-email-display"></p>
            <small id="member-since-display"></small>
        </div>

        <!-- Progress Overview -->
        <div class="progress-overview" id="progress-overview">
            <div class="stat-card">
                <div class="stat-number" id="total-courses">0</div>
                <div class="stat-label">Jami kurslar</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completed-lessons">0</div>
                <div class="stat-label">Yakunlangan darslar</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-hours">0</div>
                <div class="stat-label">O'qish soatlari</div>
            </div>
        </div>

        <!-- Reklama -->
        <div id="header-ad" class="ad-container"></div>

        <div class="grid">
            <!-- Mening kurslarim -->
            <div style="grid-column: 1 / -1;">
                <h2 class="mb-2">📚 Mening Kurslarim</h2>
                <div class="grid" id="my-courses">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Global Chat -->
            <div class="global-chat">
                <h3>💬 Umumiy Chat</h3>
                <div class="chat-messages" id="chat-messages">
                    <p style="color: var(--text-secondary); text-align: center;">
                        Xabarlar yuklanmoqda...
                    </p>
                </div>
                <div class="chat-input-group">
                    <input type="text" id="chat-input" class="form-control" 
                           placeholder="Xabar yozing..." style="flex: 1;">
                    <button onclick="sendChatMessage()" class="btn btn-primary">📤</button>
                </div>
            </div>
        </div>

        <!-- Tavsiya qilinadigan videolar -->
        <h2 class="mt-3 mb-2">🎥 Oxirgi Darsliklar</h2>
        <div class="grid" id="recent-videos">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 ANFKA Academy. Barcha huquqlar himoyalangan.</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7357410271113724" crossorigin="anonymous"></script>
    
    <!-- Custom JavaScript -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="database-manager.js"></script>
    <script src="ads.js"></script>
    
    <script>
        let currentUser = null;
        
        // Foydalanuvchi ma'lumotlarini yuklash
        async function loadDashboard() {
            currentUser = auth.currentUser;
            if (!currentUser) {
                window.location.href = 'auth.html';
                return;
            }
            
            document.getElementById('user-email-display').textContent = `📧 ${currentUser.email}`;
            
            try {
                // Firestore'dan ma'lumotlarni olish
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    document.getElementById('user-greeting').textContent = 
                        `👋 Xush kelibsiz, ${userData.fullName}!`;
                    
                    if (userData.createdAt) {
                        const date = userData.createdAt.toDate();
                        document.getElementById('member-since-display').textContent = 
                            `📅 A'zo bo'lgan: ${date.toLocaleDateString('uz-UZ')}`;
                    }
                    
                    // Kurslar soni
                    const courses = userData.courses || [];
                    document.getElementById('total-courses').textContent = courses.length;
                    
                    // Kurslarni yuklash
                    loadMyCourses(courses);
                }
                
                // Realtime Database'dan progress ma'lumotlari
                loadProgressData();
                
                // Oxirgi videolarni yuklash
                loadRecentVideos();
                
                // Chatni yuklash
                loadChat();
                
            } catch (error) {
                console.error('Dashboard yuklashda xatolik:', error);
            }
        }
        
        // Progress ma'lumotlarini yuklash (Realtime DB)
        function loadProgressData() {
            rtdb.ref(`users/${currentUser.uid}/progress`).on('value', (snapshot) => {
                let totalCompleted = 0;
                let totalLessons = 0;
                
                snapshot.forEach((child) => {
                    const progress = child.val();
                    totalCompleted += progress.completed || 0;
                    totalLessons += progress.total || 0;
                });
                
                document.getElementById('completed-lessons').textContent = totalCompleted;
                
                // Taxminiy soatlar (har bir dars ~30 daqiqa)
                const hours = Math.round((totalCompleted * 0.5) * 10) / 10;
                document.getElementById('total-hours').textContent = hours;
            });
        }
        
        // Kurslarni yuklash
        async function loadMyCourses(courseIds) {
            const container = document.getElementById('my-courses');
            
            if (!courseIds || courseIds.length === 0) {
                container.innerHTML = `
                    <div class="card text-center" style="grid-column: 1 / -1;">
                        <div style="font-size: 3rem;">📚</div>
                        <p>Hali hech qanday kursga yozilmagansiz</p>
                        <a href="courses.html" class="btn btn-primary mt-1">Kurslarni Ko'rish</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            
            for (const courseId of courseIds) {
                try {
                    const courseDoc = await db.collection('courses').doc(courseId).get();
                    if (courseDoc.exists) {
                        const course = courseDoc.data();
                        
                        // Progress ma'lumotlari
                        let progressPercent = 0;
                        try {
                            const progressSnapshot = await rtdb.ref(
                                `users/${currentUser.uid}/progress/${courseId}`
                            ).once('value');
                            const progress = progressSnapshot.val();
                            if (progress && progress.total > 0) {
                                progressPercent = Math.round((progress.completed / progress.total) * 100);
                            }
                        } catch (e) {}
                        
                        container.innerHTML += `
                            <div class="course-progress-card">
                                <h4>${course.title || 'Kurs'}</h4>
                                <p>${course.description || ''}</p>
                                <div class="progress mt-1">
                                    <div class="progress-bar" style="width: ${progressPercent}%"></div>
                                </div>
                                <small>${progressPercent}% yakunlangan</small>
                                <div class="mt-1">
                                    <a href="courses.html" class="btn btn-primary" style="width: 100%;">
                                        Davom ettirish
                                    </a>
                                </div>
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error('Kurs yuklashda xatolik:', error);
                }
            }
        }
        
        // Oxirgi videolarni yuklash
        async function loadRecentVideos() {
            const container = document.getElementById('recent-videos');
            
            try {
                const videos = await dbManager.getVideos();
                const recentVideos = videos.slice(0, 6); // Oxirgi 6 ta video
                
                if (recentVideos.length === 0) {
                    container.innerHTML = '<p class="text-center">Hozircha videolar yo\'q</p>';
                    return;
                }
                
                container.innerHTML = recentVideos.map(video => `
                    <div class="card">
                        <div style="font-size: 2rem;">🎥</div>
                        <h4>${video.title}</h4>
                        <p>${video.description || ''}</p>
                        <small>👁️ ${video.views || 0} ko'rishlar</small>
                        <div class="mt-1">
                            <a href="${video.url}" target="_blank" class="btn btn-outline" style="width: 100%;">
                                ▶️ Ko'rish
                            </a>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Videolarni yuklashda xatolik:', error);
                container.innerHTML = '<p class="text-center">Videolarni yuklashda xatolik</p>';
            }
        }
        
        // Global chat
        function loadChat() {
            const chatMessages = document.getElementById('chat-messages');
            
            dbManager.onGlobalMessages((messages) => {
                chatMessages.innerHTML = messages.map(msg => `
                    <div class="chat-message">
                        <span class="username">${msg.username || 'Anonim'}:</span>
                        <span>${msg.text}</span>
                        <small style="float: right; color: var(--text-secondary);">
                            ${new Date(msg.timestamp).toLocaleTimeString('uz-UZ')}
                        </small>
                    </div>
                `).join('');
                
                // Avtomatik scroll pastga
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }
        
        // Chat xabarini yuborish
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            
            if (!text || !currentUser) return;
            
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const username = userDoc.exists ? userDoc.data().fullName : currentUser.email;
                
                await dbManager.sendGlobalMessage(currentUser.uid, username, text);
                input.value = '';
            } catch (error) {
                console.error('Xabar yuborishda xatolik:', error);
                alert('Xabar yuborilmadi. Iltimos qayta urinib ko\'ring.');
            }
        }
        
        // Enter tugmasi bilan xabar yuborish
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement === document.getElementById('chat-input')) {
                sendChatMessage();
            }
        });
        
        // Chiqish
        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            if (confirm('Haqiqatan ham chiqmoqchimisiz?')) {
                await logoutUser();
                window.location.href = 'index.html';
            }
        });
        
        // Sahifa yuklanganda
        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    loadDashboard();
                } else {
                    window.location.href = 'auth.html';
                }
            });
        });
    </script>
</body>
</html>
