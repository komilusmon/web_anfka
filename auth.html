<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANFKA Academy - Kirish</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">🎓 ANFKA Academy</a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">Asosiy</a></li>
            <li><a href="courses.html" class="nav-link">Kurslar</a></li>
            <li><a href="contact.html" class="nav-link">Aloqa</a></li>
        </ul>
    </nav>

    <div class="auth-container card">
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Kirish</button>
            <button class="auth-tab" onclick="switchTab('register')">Ro'yxatdan o'tish</button>
        </div>

        <div id="message"></div>

        <form id="login-form" class="auth-form active">
            <div class="form-group">
                <label class="form-label">📧 Email</label>
                <input type="email" id="login-email" class="form-control" placeholder="Email manzilingiz" required>
            </div>
            <div class="form-group password-field">
                <label class="form-label">🔒 Parol</label>
                <input type="password" id="login-password" class="form-control" placeholder="Parolingiz" required>
                <button type="button" class="toggle-password" onclick="togglePassword('login-password')">👁️</button>
            </div>
            <button type="submit" class="btn btn-primary w-full">🔑 Kirish</button>
            <div class="text-center mt-1">
                <a href="#" onclick="showReset()" style="color:var(--primary-color);">Parolni unutdingizmi?</a>
            </div>
        </form>

        <form id="register-form" class="auth-form">
            <div class="form-group">
                <label class="form-label">👤 To'liq ism</label>
                <input type="text" id="register-name" class="form-control" placeholder="Ismingiz" required>
            </div>
            <div class="form-group">
                <label class="form-label">📧 Email</label>
                <input type="email" id="register-email" class="form-control" placeholder="Email" required>
            </div>
            <div class="form-group password-field">
                <label class="form-label">🔒 Parol</label>
                <input type="password" id="register-password" class="form-control" placeholder="Kamida 6 belgi" required minlength="6">
                <button type="button" class="toggle-password" onclick="togglePassword('register-password')">👁️</button>
            </div>
            <button type="submit" class="btn btn-primary w-full" id="register-submit-btn">📝 Ro'yxatdan o'tish</button>
        </form>

        <form id="reset-form" class="auth-form">
            <h3 class="text-center mb-2">🔑 Parolni Tiklash</h3>
            <div class="form-group">
                <label class="form-label">📧 Email</label>
                <input type="email" id="reset-email" class="form-control" placeholder="Email" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">📤 Yuborish</button>
            <div class="text-center mt-1">
                <a href="#" onclick="switchTab('login')" style="color:var(--primary-color);">← Qaytish</a>
            </div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
            document.getElementById('message').innerHTML = '';
        }

        function showReset() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('reset-form').classList.add('active');
        }

        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function showMessage(text, type) {
            const div = document.getElementById('message');
            div.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
            setTimeout(() => div.innerHTML = '', 5000);
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = 'Kuting...';
            const result = await loginUser(email, password);
            if (result.success) {
                showMessage(result.message, 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } else {
                showMessage(result.message, 'danger');
                btn.disabled = false;
                btn.innerHTML = '🔑 Kirish';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const btn = document.getElementById('register-submit-btn');
            
            if (!fullName || fullName.length < 2) { showMessage('To\'liq ism kiriting', 'danger'); return; }
            if (!email.includes('@')) { showMessage('To\'g\'ri email kiriting', 'danger'); return; }
            if (password.length < 6) { showMessage('Parol kamida 6 belgi', 'danger'); return; }
            
            btn.disabled = true;
            btn.innerHTML = 'Ro\'yxatdan o\'tilmoqda...';
            
            const result = await registerUser(email, password, fullName);
            if (result.success) {
                showMessage('✅ ' + result.message, 'success');
                document.getElementById('register-form').reset();
                setTimeout(() => { switchTab('login'); document.getElementById('login-email').value = email; }, 2000);
            } else {
                showMessage('❌ ' + result.message, 'danger');
                btn.disabled = false;
                btn.innerHTML = '📝 Ro\'yxatdan o\'tish';
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value.trim();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = 'Yuborilmoqda...';
            const result = await resetPassword(email);
            showMessage(result.message, result.success ? 'success' : 'danger');
            btn.disabled = false;
            btn.innerHTML = '📤 Yuborish';
            if (result.success) setTimeout(() => switchTab('login'), 2000);
        });
    </script>
</body>
</html>
