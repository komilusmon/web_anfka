<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANFKA Academy - Kurslar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">🎓 ANFKA Academy</a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">Asosiy</a></li>
            <li><a href="courses.html" class="nav-link active">Kurslar</a></li>
            <li><a href="contact.html" class="nav-link">Aloqa</a></li>
            <li><a href="auth.html" class="nav-link btn-auth" id="auth-link">Kirish</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="text-center mb-3">📚 Barcha Bepul Kurslar</h1>
        
        <div class="card mb-2">
            <div class="flex gap-2 align-center">
                <input type="text" id="search-input" class="form-control" placeholder="🔍 Kurs qidirish..." style="flex:1;">
                <select id="category-filter" class="form-control" style="width:200px;">
                    <option value="">Barchasi</option>
                </select>
            </div>
        </div>

        <div id="header-ad" class="ad-container"></div>
        <div class="grid" id="courses-grid"><div class="spinner"></div></div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 ANFKA Academy. Barcha huquqlar himoyalangan.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7357410271113724" crossorigin="anonymous"></script>
    
    <script src="firebase-config.js"></script>
    <script src="database-manager.js"></script>
    <script src="video-player.js"></script>
    <script src="ads.js"></script>

    <script>
        let allCourses = [];

        const defaultCourses = [
            { id: 'web-dev', title: 'Web Dasturlash', desc: 'HTML, CSS va JavaScript asoslari', category: 'programming', icon: '🌐', lessons: 24, duration: '12 hafta', level: 'Boshlang\'ich' },
            { id: 'python', title: 'Python Dasturlash', desc: 'Python asoslari', category: 'programming', icon: '🐍', lessons: 30, duration: '15 hafta', level: 'Boshlang\'ich' },
            { id: 'graphic-design', title: 'Grafik Dizayn', desc: 'Photoshop va Illustrator', category: 'design', icon: '🎨', lessons: 18, duration: '8 hafta', level: 'O\'rta' },
            { id: 'digital-marketing', title: 'Raqamli Marketing', desc: 'SEO, SMM strategiyalari', category: 'marketing', icon: '📈', lessons: 20, duration: '10 hafta', level: 'Boshlang\'ich' },
            { id: 'react-js', title: 'React JS', desc: 'Frontend kutubxonasi', category: 'programming', icon: '⚛️', lessons: 28, duration: '14 hafta', level: 'O\'rta' },
            { id: 'ui-ux', title: 'UI/UX Dizayn', desc: 'Interfeys dizayni', category: 'design', icon: '🎯', lessons: 22, duration: '11 hafta', level: 'Boshlang\'ich' }
        ];

        async function loadCourses() {
            try {
                const cats = await dbManager.getCategories();
                const filter = document.getElementById('category-filter');
                if (cats.length > 0) {
                    filter.innerHTML = '<option value="">Barchasi</option>' + cats.map(c => `<option value="${c.id}">${c.icon||''} ${c.name}</option>`).join('');
                }
                
                allCourses = defaultCourses;
                displayCourses(allCourses);
            } catch (e) {
                allCourses = defaultCourses;
                displayCourses(allCourses);
            }
        }

        function displayCourses(courses) {
            const container = document.getElementById('courses-grid');
            if (courses.length === 0) {
                container.innerHTML = '<div class="card text-center" style="grid-column:1/-1;"><p>Kurslar topilmadi</p></div>';
                return;
            }
            container.innerHTML = courses.map(c => `
                <div class="card" style="cursor:pointer;">
                    <div style="text-align:center;font-size:3rem;">${c.icon}</div>
                    <h3>${c.title}</h3>
                    <p>${c.desc}</p>
                    <small>📚 ${c.lessons} ta dars | ⏱️ ${c.duration}</small>
                    <span class="badge" style="display:inline-block;margin-top:0.5rem;">${c.level}</span>
                    <button class="btn btn-primary mt-1" style="width:100%;" onclick="startCourse('${c.id}')">🎓 Kursni Boshlash</button>
                </div>
            `).join('');
        }

        function startCourse(courseId) {
            const course = allCourses.find(c => c.id === courseId);
            if (course) {
                videoPlayer.openCourse(courseId, {
                    title: course.title,
                    icon: course.icon,
                    description: course.desc,
                    lessonsCount: course.lessons
                });
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allCourses.filter(c => c.title.toLowerCase().includes(term) || c.desc.toLowerCase().includes(term));
            displayCourses(filtered);
        });

        document.getElementById('category-filter').addEventListener('change', (e) => {
            const cat = e.target.value;
            const filtered = cat ? allCourses.filter(c => c.category === cat) : allCourses;
            displayCourses(filtered);
        });

        auth.onAuthStateChanged(user => {
            const link = document.getElementById('auth-link');
            if (user) { link.textContent = 'Kabinet'; link.href = 'dashboard.html'; }
            else { link.textContent = 'Kirish'; link.href = 'auth.html'; }
        });

        document.addEventListener('DOMContentLoaded', loadCourses);
    </script>
</body>
</html>
