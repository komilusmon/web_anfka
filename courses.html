<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-7357410271113724">
    <title>ANFKA Academy - Kurslar</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">🎓 ANFKA Academy</a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">Asosiy</a></li>
            <li><a href="courses.html" class="nav-link active">Kurslar</a></li>
            <li><a href="contact.html" class="nav-link">Aloqa</a></li>
            <li><a href="auth.html" class="nav-link btn-auth" id="auth-link">Kirish</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="text-center mb-2">📚 Barcha Bepul Kurslar</h1>
        
        <div class="card mb-2">
            <div class="flex gap-2 align-center flex-wrap">
                <input type="text" id="search-input" class="form-control" placeholder="🔍 Kurs qidirish..." style="flex:1;min-width:200px;">
                <select id="category-filter" class="form-control" style="width:200px;">
                    <option value="">Barchasi</option>
                </select>
            </div>
        </div>

        <div class="grid" id="courses-grid"><div class="spinner"></div></div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 ANFKA Academy. Barcha huquqlar himoyalangan.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7357410271113724" crossorigin="anonymous"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/database-manager.js"></script>
    <script src="js/video-player.js"></script>
    <script src="js/ads.js"></script>

    <script>
        let allVideos = [];
        let allCategories = [];

        async function loadCategories() {
            try {
                allCategories = await dbManager.getCategories();
                const filter = document.getElementById('category-filter');
                if (allCategories.length > 0) {
                    filter.innerHTML = '<option value="">Barchasi</option>' + 
                        allCategories.map(c => `<option value="${c.id}">${c.icon||'📁'} ${c.name}</option>`).join('');
                }
            } catch (e) { console.error(e); }
        }

        async function loadVideos() {
            const container = document.getElementById('courses-grid');
            try {
                allVideos = await dbManager.getActiveVideos();
                
                // Videolarni kurslar bo'yicha guruhlash
                const courseGroups = {};
                allVideos.forEach(v => {
                    const courseId = v.courseId || v.category || 'umumiy';
                    if (!courseGroups[courseId]) {
                        courseGroups[courseId] = {
                            id: courseId,
                            title: v.courseTitle || v.category || 'Kurs',
                            icon: v.courseIcon || '📚',
                            description: v.courseDescription || v.description || '',
                            count: 0
                        };
                    }
                    courseGroups[courseId].count++;
                });

                const courses = Object.values(courseGroups);
                
                if (courses.length === 0) {
                    container.innerHTML = '<div class="card text-center"><p>📭 Hozircha kurslar yo\'q</p></div>';
                    return;
                }

                displayCourses(courses);
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="card text-center"><p>❌ Yuklashda xatolik</p></div>';
            }
        }

        function displayCourses(courses) {
            const container = document.getElementById('courses-grid');
            container.innerHTML = courses.map(c => `
                <div class="course-card">
                    <div class="course-card-header">
                        <div style="font-size:3rem;">${c.icon}</div>
                        <h3>${c.title}</h3>
                    </div>
                    <div class="course-card-body">
                        <p>${c.description ? c.description.substring(0, 100) + '...' : ''}</p>
                        <p>📚 ${c.count} ta darslik</p>
                    </div>
                    <div class="course-card-footer">
                        <button class="btn btn-primary w-full" onclick="startCourse('${c.id}')">🎓 Kursni Boshlash</button>
                    </div>
                </div>
            `).join('');
        }

        function startCourse(courseId) {
            const courseVideos = allVideos.filter(v => (v.courseId === courseId) || (v.category === courseId));
            let courseData = { title: 'Kurs', icon: '📚', description: '', count: courseVideos.length };
            if (courseVideos.length > 0) {
                courseData.title = courseVideos[0].courseTitle || courseVideos[0].category || 'Kurs';
                courseData.icon = courseVideos[0].courseIcon || '📚';
                courseData.description = courseVideos[0].courseDescription || '';
            }
            if (typeof videoPlayer !== 'undefined') {
                videoPlayer.openCourse(courseId, courseData);
            }
        }

        document.getElementById('search-input').addEventListener('input', () => {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allVideos.filter(v => v.title?.toLowerCase().includes(term));
            const courseGroups = {};
            filtered.forEach(v => {
                const cid = v.courseId || v.category || 'umumiy';
                if (!courseGroups[cid]) courseGroups[cid] = { id: cid, title: v.courseTitle || v.category || 'Kurs', icon: v.courseIcon || '📚', description: v.courseDescription || '', count: 0 };
                courseGroups[cid].count++;
            });
            displayCourses(Object.values(courseGroups));
        });

        document.getElementById('category-filter').addEventListener('change', (e) => {
            const cat = e.target.value;
            const filtered = cat ? allVideos.filter(v => v.category === cat) : allVideos;
            const courseGroups = {};
            filtered.forEach(v => {
                const cid = v.courseId || v.category || 'umumiy';
                if (!courseGroups[cid]) courseGroups[cid] = { id: cid, title: v.courseTitle || v.category || 'Kurs', icon: v.courseIcon || '📚', description: v.courseDescription || '', count: 0 };
                courseGroups[cid].count++;
            });
            displayCourses(Object.values(courseGroups));
        });

        auth.onAuthStateChanged(user => {
            const link = document.getElementById('auth-link');
            if (user) { link.textContent = 'Kabinet'; link.href = 'dashboard.html'; }
            else { link.textContent = 'Kirish'; link.href = 'auth.html'; }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadCategories();
            await loadVideos();
        });
    </script>
</body>
</html>
