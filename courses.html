<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-7357410271113724">
    <title>ANFKA Academy - Bepul Kurslar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .category-filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .category-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .category-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .video-card {
            cursor: pointer;
            transition: transform 0.3s;
        }
        .video-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">🎓 ANFKA Academy</a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">Asosiy</a></li>
            <li><a href="courses.html" class="nav-link active">Kurslar</a></li>
            <li><a href="contact.html" class="nav-link">Aloqa</a></li>
            <li><a href="auth.html" class="nav-link" id="auth-link">Kirish</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="text-center mb-3">📚 Barcha Bepul Darsliklar</h1>
        
        <!-- Qidiruv -->
        <div class="card mb-2">
            <div class="flex gap-1 align-center">
                <input type="text" id="search-input" class="form-control" 
                       placeholder="🔍 Darslik qidirish..." style="flex: 1;">
            </div>
        </div>

        <!-- Kategoriya filtrlari -->
        <div class="category-filter-buttons" id="category-filters">
            <button class="category-btn active" onclick="filterByCategory('all')">Barchasi</button>
            <div class="spinner" style="width:20px;height:20px;"></div>
        </div>

        <!-- Reklama -->
        <div id="header-ad" class="ad-container"></div>

        <!-- Videolar grid -->
        <div class="grid" id="videos-grid">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 ANFKA Academy. Barcha huquqlar himoyalangan.</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7357410271113724" crossorigin="anonymous"></script>
    
    <!-- Custom JavaScript -->
    <script src="firebase-config.js"></script>
    <script src="database-manager.js"></script>
    <script src="ads.js"></script>
    
    <script>
        let allCategories = [];
        let allVideos = [];
        let currentCategory = 'all';
        
        // Kategoriyalarni yuklash
        async function loadCategories() {
            try {
                allCategories = await dbManager.getCategories();
                const filterContainer = document.getElementById('category-filters');
                
                if (allCategories.length > 0) {
                    filterContainer.innerHTML = `
                        <button class="category-btn active" onclick="filterByCategory('all')">Barchasi</button>
                        ${allCategories.map(cat => `
                            <button class="category-btn" onclick="filterByCategory('${cat.id}')">
                                ${cat.icon || ''} ${cat.name}
                            </button>
                        `).join('')}
                    `;
                } else {
                    filterContainer.innerHTML = `
                        <button class="category-btn active" onclick="filterByCategory('all')">Barchasi</button>
                        <button class="category-btn" onclick="filterByCategory('programming')">💻 Dasturlash</button>
                        <button class="category-btn" onclick="filterByCategory('design')">🎨 Dizayn</button>
                        <button class="category-btn" onclick="filterByCategory('marketing')">📈 Marketing</button>
                    `;
                }
            } catch (error) {
                console.error('Kategoriyalarni yuklashda xatolik:', error);
            }
        }
        
        // Videolarni yuklash
        async function loadVideos() {
            try {
                allVideos = await dbManager.getVideos();
                displayVideos(allVideos);
            } catch (error) {
                console.error('Videolarni yuklashda xatolik:', error);
                // Default videolar
                allVideos = getDefaultVideos();
                displayVideos(allVideos);
            }
        }
        
        // Default videolar
        function getDefaultVideos() {
            return [
                { id: '1', title: 'HTML asoslari', description: 'HTML bilan tanishing', url: '#', categoryId: 'programming', views: 150 },
                { id: '2', title: 'CSS asoslari', description: 'Stillash asoslari', url: '#', categoryId: 'programming', views: 120 },
                { id: '3', title: 'JavaScript asoslari', description: 'Dasturlash tili', url: '#', categoryId: 'programming', views: 200 },
                { id: '4', title: 'Photoshop darslari', description: 'Grafik dizayn', url: '#', categoryId: 'design', views: 90 },
                { id: '5', title: 'SEO asoslari', description: 'Qidiruv optimizatsiyasi', url: '#', categoryId: 'marketing', views: 80 },
                { id: '6', title: 'SMM strategiyasi', description: 'Ijtimoiy tarmoqlar', url: '#', categoryId: 'marketing', views: 110 }
            ];
        }
        
        // Videolarni ko'rsatish
        function displayVideos(videos) {
            const container = document.getElementById('videos-grid');
            
            if (videos.length === 0) {
                container.innerHTML = `
                    <div class="card text-center" style="grid-column: 1 / -1;">
                        <p>📭 Bu kategoriyada hozircha videolar yo'q</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = videos.map(video => `
                <div class="card video-card" onclick="watchVideo('${video.url}', '${video.id}')">
                    <div style="font-size: 3rem; text-align: center;">🎥</div>
                    <h3>${video.title}</h3>
                    <p>${video.description || 'Tavsif mavjud emas'}</p>
                    <div class="flex justify-between align-center mt-1">
                        <small>👁️ ${video.views || 0} ko'rishlar</small>
                        <small>📅 ${video.createdAt ? new Date(video.createdAt.toDate()).toLocaleDateString('uz-UZ') : 'Yangi'}</small>
                    </div>
                </div>
            `).join('');
        }
        
        // Video ko'rish
        async function watchVideo(url, videoId) {
            // Ko'rishlar sonini oshirish (Firestore)
            try {
                await db.collection('videos').doc(videoId).update({
                    views: firebase.firestore.FieldValue.increment(1)
                });
            } catch (error) {
                console.error('Ko\'rishlar sonini yangilashda xatolik:', error);
            }
            
            // Progress yangilash (Realtime Database)
            const user = auth.currentUser;
            if (user) {
                try {
                    const progressRef = rtdb.ref(`users/${user.uid}/progress/${videoId}`);
                    const snapshot = await progressRef.once('value');
                    const currentProgress = snapshot.val() || { completed: 0, total: 1 };
                    
                    await progressRef.update({
                        completed: (currentProgress.completed || 0) + 1,
                        total: currentProgress.total || 1,
                        lastAccessed: firebase.database.ServerValue.TIMESTAMP
                    });
                } catch (error) {
                    console.error('Progress yangilashda xatolik:', error);
                }
            }
            
            // Yangi oynada ochish
            window.open(url, '_blank');
        }
        
        // Kategoriya bo'yicha filtrlash
        function filterByCategory(categoryId) {
            currentCategory = categoryId;
            
            // Aktiv tugmani yangilash
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Filtrlash
            if (categoryId === 'all') {
                displayVideos(allVideos);
            } else {
                const filtered = allVideos.filter(v => v.categoryId === categoryId);
                displayVideos(filtered);
            }
        }
        
        // Qidiruv
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            let videosToSearch = allVideos;
            if (currentCategory !== 'all') {
                videosToSearch = allVideos.filter(v => v.categoryId === currentCategory);
            }
            
            const filtered = videosToSearch.filter(v => 
                v.title.toLowerCase().includes(searchTerm) ||
                (v.description && v.description.toLowerCase().includes(searchTerm))
            );
            
            displayVideos(filtered);
        });
        
        // Foydalanuvchi holatini tekshirish
        auth.onAuthStateChanged((user) => {
            const authLink = document.getElementById('auth-link');
            if (user) {
                authLink.textContent = 'Kabinet';
                authLink.href = 'dashboard.html';
            } else {
                authLink.textContent = 'Kirish';
                authLink.href = 'auth.html';
            }
        });
        
        // Sahifa yuklanganda
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadVideos();
        });
    </script>
</body>
</html>
