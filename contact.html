<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-7357410271113724">
    <title>ANFKA Academy - Aloqa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">🎓 ANFKA Academy</a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">Asosiy</a></li>
            <li><a href="courses.html" class="nav-link">Kurslar</a></li>
            <li><a href="contact.html" class="nav-link active">Aloqa</a></li>
            <li><a href="auth.html" class="nav-link" id="auth-link">Kirish</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <h2 class="text-center mb-2">📝 Biz bilan bog'lanish</h2>
            
            <!-- Xabar maydoni -->
            <div id="message"></div>
            
            <form id="feedback-form">
                <div class="form-group">
                    <label class="form-label">Ismingiz</label>
                    <input type="text" id="name" class="form-control" 
                           placeholder="Ismingizni kiriting" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email manzilingiz</label>
                    <input type="email" id="email" class="form-control" 
                           placeholder="Email manzilingizni kiriting" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Mavzu</label>
                    <select id="subject" class="form-control">
                        <option value="Umumiy savol">Umumiy savol</option>
                        <option value="Kurs haqida">Kurs haqida</option>
                        <option value="Texnik muammo">Texnik muammo</option>
                        <option value="Taklif">Taklif</option>
                        <option value="Shikoyat">Shikoyat</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Xabaringiz</label>
                    <textarea id="message-text" class="form-control" rows="5" 
                              placeholder="Xabaringizni yozing..." required></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    📤 Xabarni Yuborish
                </button>
            </form>
        </div>

        <!-- Aloqa ma'lumotlari -->
        <div class="grid mt-3">
            <div class="card text-center">
                <h3>📧 Email</h3>
                <p>info@anfka-academy.uz</p>
            </div>
            <div class="card text-center">
                <h3>📱 Telefon</h3>
                <p>+998 90 123 45 67</p>
            </div>
            <div class="card text-center">
                <h3>📍 Manzil</h3>
                <p>Toshkent sh., O'zbekiston</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 ANFKA Academy. Barcha huquqlar himoyalangan.</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7357410271113724" crossorigin="anonymous"></script>
    
    <!-- Custom JavaScript -->
    <script src="firebase-config.js"></script>
    <script src="emailjs-config.js"></script>
    <script src="ads.js"></script>
    
    <script>
        // Xabar yuborish
        document.getElementById('feedback-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const messageText = document.getElementById('message-text').value;
            const button = e.target.querySelector('button');
            
            // Loading
            button.disabled = true;
            button.textContent = 'Yuborilmoqda...';
            
            try {
                // EmailJS orqali yuborish
                const result = await sendFeedback(email, name, messageText, subject);
                
                // Firestore-ga ham saqlash
                await db.collection('feedbacks').add({
                    name: name,
                    email: email,
                    subject: subject,
                    message: messageText,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'yangi'
                });
                
                // Muvaffaqiyatli xabar
                const messageDiv = document.getElementById('message');
                messageDiv.innerHTML = `
                    <div class="alert alert-success">
                        ✅ Xabaringiz muvaffaqiyatli yuborildi! Tez orada javob beramiz.
                    </div>
                `;
                
                // Formani tozalash
                document.getElementById('feedback-form').reset();
                
                // Xabarni o'chirish
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 5000);
                
            } catch (error) {
                console.error('Xatolik:', error);
                const messageDiv = document.getElementById('message');
                messageDiv.innerHTML = `
                    <div class="alert alert-danger">
                        ❌ Xatolik yuz berdi. Iltimos qayta urinib ko'ring.
                    </div>
                `;
            } finally {
                button.disabled = false;
                button.textContent = '📤 Xabarni Yuborish';
            }
        });
        
        // Foydalanuvchi holatini tekshirish
        auth.onAuthStateChanged((user) => {
            const authLink = document.getElementById('auth-link');
            if (user) {
                authLink.textContent = 'Kabinet';
                authLink.href = 'dashboard.html';
            } else {
                authLink.textContent = 'Kirish';
                authLink.href = 'auth.html';
            }
        });
    </script>
</body>
</html>
